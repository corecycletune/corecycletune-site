      <h1>このサイトについて</h1>

      <p>
        CCT Lab は、睡眠・血糖・腸内環境・ストレス、そして「やる気」を整えるための個人研究ラボです。
        公開論文や一次情報を土台にしながら、それを日常行動に翻訳します。
      </p>

      <h2>方針</h2>
      <ul>
        <li>私は医師ではありません。医療行為や診断は行いません。</li>
        <li>研究の条件や限界を明記し、単一研究で断定しません。</li>
        <li>今日から試せる「小さな行動」に落として提案します。</li>
      </ul>

      <h2>読み方</h2>
      <ol>
        <li>記事で全体像をつかむ</li>
        <li>要点パートで重要ポイントを確認する</li>
        <li>実践パートから1つだけ試す</li>
        <li>体感とやる気の変化を記録する</li>
      </ol>
