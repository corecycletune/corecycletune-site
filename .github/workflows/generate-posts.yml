name: Generate posts.json and sitemap.xml

on:
  push:
    paths:
      - "articles/**"
      - "scripts/**"
      - "data/**"
      - ".github/workflows/generate-posts.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate posts.json
        run: node scripts/generate_posts.js

      - name: Generate sitemap.xml
        run: node scripts/generate_sitemap.js

      - name: Commit generated files (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/posts.json sitemap.xml

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update posts.json and sitemap.xml"
          git push
