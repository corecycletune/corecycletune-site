<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CCT Lab</title>
  <meta name="description" content="睡眠・血糖・腸内環境・ストレス、そして「やる気」を整えるための個人研究ラボ。" />
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body>
  <header id="site-header"></header>

  <main class="container">
    <section class="hero">
      <h1>状態を整えると、行動が変わる。</h1>
      <p>
        CCT Lab は、睡眠・血糖・腸内環境・ストレス、そして「やる気」を整えるための個人研究ラボです。<br />
        公開論文や一次情報を土台にしながら、それを日常行動に翻訳します（医療助言ではありません）。
      </p>

      <div class="hero-actions">
        <a class="btn btn-primary" href="/articles/">記事を読む</a>
        <a class="btn btn-ghost" href="/about/">このサイトについて</a>
      </div>
    </section>

    <section class="card">
      <h2>まずはここから（30秒）</h2>
      <ul>
        <li>やる気は性格ではなく、状態として扱う</li>
        <li>原因を1つに決めつけない（睡眠・食べ方・刺激・活動量の合算）</li>
        <li>今日の1アクションに落として、記録して再現する</li>
      </ul>

      <div class="notice">
        ここで扱うのは「診断」ではなく「整理」です。体調に不安がある場合や治療中の方は医療機関にご相談ください。
      </div>
    </section>

    <section class="grid-2">
      <section class="card">
        <h2>カテゴリ</h2>
        <div id="topics-list"></div>
      </section>

      <section class="card">
        <h2>まず読むなら</h2>
        <div id="latest-articles"></div>
      </section>
    </section>
  </main>

  <footer id="site-footer"></footer>

  <script src="/assets/app.js" defer></script>
</body>
</html>
